<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>アルティーリ千葉 ユニフォームシミュレーター</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,sans-serif;background:#e8e8e8;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;}
h1{font-size:20px;font-weight:700;color:#1b2140;margin-bottom:8px;text-align:center;}
p{font-size:14px;color:#666;margin-bottom:36px;text-align:center;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:640px;width:100%;}
a{display:block;background:white;border-radius:12px;padding:28px 20px;text-align:center;text-decoration:none;box-shadow:0 2px 12px rgba(0,0,0,0.10);transition:transform .15s,box-shadow .15s;}
a:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,0,0,0.15);}
.badge{display:inline-block;width:56px;height:56px;border-radius:50%;margin-bottom:14px;}
.home .badge{background:#1b2140;}
.away .badge{background:white;border:2px solid #1b2140;}
.label{font-size:16px;font-weight:600;color:#1b2140;}
.sub{font-size:12px;color:#888;margin-top:4px;}
@media(max-width:480px){.grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<h1>アルティーリ千葉<br>ユニフォームシミュレーター</h1>
<p>ユニフォームを選んで背番号・選手名をカスタマイズ</p>
<div class="grid">
  <a href="home.html" class="home">
    <div class="badge"></div>
    <div class="label">ホーム</div>
    <div class="sub">ネイビー</div>
  </a>
  <a href="away.html" class="away">
    <div class="badge"></div>
    <div class="label">アウェイ</div>
    <div class="sub">ホワイト</div>
  </a>
</div>
</body>
</html>
